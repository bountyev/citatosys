<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажёр</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Golos+Text:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a;
    --text: #f5f5f5; --muted: #555; --border: rgba(255,255,255,0.1);
    --correct: #fff; --wrong: #444; --pending: #333;
    --font-head: 'Unbounded', sans-serif; --font-body: 'Golos Text', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow-x: hidden; }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    padding: 2rem 3rem;
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .logo { font-family: var(--font-head); font-size: 11px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; }
  .hint { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }
  .hint span { display: inline-block; border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 11px; margin: 0 2px; }

  main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 4rem 3rem; max-width: 900px; width: 100%; margin: 0 auto; }

  .stats { display: flex; gap: 3rem; margin-bottom: 3rem; }
  .stat-val { font-family: var(--font-head); font-size: 2.5rem; font-weight: 900; color: var(--text); line-height: 1; letter-spacing: -0.03em; }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px; }

  .progress-bar { height: 1px; background: var(--border); margin-bottom: 3rem; position: relative; }
  .progress-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--text); transition: width 0.1s; }

  .cat-row { display: flex; gap: 6px; margin-bottom: 2.5rem; flex-wrap: wrap; }
  .cat-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 100px;
    padding: 5px 14px; font-family: var(--font-body); font-size: 11px;
    color: var(--muted); cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;
  }
  .cat-btn:hover { border-color: #555; color: #aaa; }
  .cat-btn.active { border-color: var(--text); color: var(--text); }

  .quote-source {
    font-size: 10px; letter-spacing: 0.25em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 10px;
  }
  .promo-badge {
    display: none; font-size: 9px; padding: 2px 8px;
    border: 1px solid #333; border-radius: 100px; color: var(--muted);
    letter-spacing: 0.15em; font-family: var(--font-head);
  }
  .is-promo .promo-badge { display: inline-block; }

  #quote-display {
    font-family: var(--font-body); font-size: clamp(1.4rem, 3vw, 2rem);
    line-height: 1.7; letter-spacing: 0.01em; margin-bottom: 3rem; min-height: 4rem;
  }
  .char { color: var(--pending); transition: color 0.04s; }
  .char.correct { color: var(--correct); }
  .char.wrong { color: #666; text-decoration: underline; text-decoration-color: #444; }
  .char.cursor { color: var(--pending); border-bottom: 2px solid var(--text); animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #type-input {
    width: 100%; background: transparent;
    border: none; border-bottom: 1px solid #333;
    padding: 1rem 0; font-family: var(--font-body); font-size: 1rem;
    color: var(--text); outline: none; transition: border-color 0.2s; letter-spacing: 0.05em;
  }
  #type-input:focus { border-bottom-color: var(--text); }
  #type-input::placeholder { color: var(--muted); }

  .complete-overlay {
    display: none; position: fixed; inset: 0; background: var(--bg);
    align-items: center; justify-content: center; flex-direction: column;
    gap: 1.5rem; text-align: center; z-index: 10;
  }
  .complete-overlay.show { display: flex; }
  .complete-wpm { font-family: var(--font-head); font-size: clamp(5rem, 15vw, 10rem); font-weight: 900; color: var(--text); line-height: 1; letter-spacing: -0.05em; }
  .complete-label { font-size: 10px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; }
  .complete-acc { font-family: var(--font-head); font-size: 1.2rem; color: var(--muted); letter-spacing: -0.02em; }
  .complete-next { margin-top: 1rem; font-size: 12px; color: var(--muted); letter-spacing: 0.1em; }
  .complete-next span { border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 11px; }

  footer { padding: 1.5rem 3rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  footer span { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }

  @media (max-width: 600px) {
    header, main, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
    .stats { gap: 2rem; }
    .stat-val { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Тренажёр</div>
  <div class="hint"><span>Tab</span> новая <span>Enter</span> следующая</div>
</header>

<main>
  <div class="stats">
    <div><div class="stat-val" id="wpm-val">0</div><div class="stat-label">WPM</div></div>
    <div><div class="stat-val" id="acc-val">100</div><div class="stat-label">Точность %</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="cat-row" id="cats">
    <button class="cat-btn active" data-cat="all">Все</button>
    <button class="cat-btn" data-cat="cinema">Кино</button>
    <button class="cat-btn" data-cat="books">Книги</button>
    <button class="cat-btn" data-cat="music">Музыка</button>
    <button class="cat-btn" data-cat="ad">Реклама</button>
  </div>

  <div id="quote-meta" class="quote-source">
    <span id="source-text">—</span>
    <span class="promo-badge">реклама</span>
  </div>

  <div id="quote-display"></div>
  <input type="text" id="type-input" placeholder="Начни печатать…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
</main>

<footer>
  <span>Пробел — разделитель слов</span>
  <span id="counter">0 цитат</span>
</footer>

<div class="complete-overlay" id="complete-overlay">
  <div class="complete-wpm" id="c-wpm">0</div>
  <div class="complete-label">слов в минуту</div>
  <div class="complete-acc" id="c-acc">100% точность</div>
  <div class="complete-next">нажми <span>Enter</span> для следующей</div>
</div>

<script>
const REGULAR = [
  { text: "Жить — значит медленно рождаться.", source: "Антуан де Сент-Экзюпери", cat: "books" },
  { text: "Страх — это всегда незнание.", source: "Лев Толстой", cat: "books" },
  { text: "Счастье любит тишину.", source: "Борис Пастернак", cat: "books" },
  { text: "Ты должен изменить свою жизнь.", source: "Райнер Мария Рильке", cat: "books" },
  { text: "Делай что должен — и будь что будет.", source: "Лев Толстой", cat: "books" },
  { text: "Иногда лучше молчать и казаться дураком, чем заговорить и развеять сомнения.", source: "Марк Твен", cat: "books" },
  { text: "Будущее уже здесь — просто распределено неравномерно.", source: "Уильям Гибсон", cat: "books" },
  { text: "Краткость — сестра таланта.", source: "Антон Чехов", cat: "books" },
  { text: "Тот, кто не рискует, не пьёт шампанского.", source: "Русская пословица", cat: "books" },
  { text: "Всё пройдёт. И это тоже.", source: "Царь Соломон", cat: "books" },
  { text: "Мы все умрём. Это делает нас свободными.", source: "Бойцовский клуб", cat: "cinema" },
  { text: "Надежда — хорошая штука, а хорошие вещи не умирают.", source: "Побег из Шоушенка", cat: "cinema" },
  { text: "Жизнь — это коробка шоколадных конфет.", source: "Форрест Гамп", cat: "cinema" },
  { text: "Иногда я вижу мёртвых людей.", source: "Шестое чувство", cat: "cinema" },
  { text: "С большой силой приходит большая ответственность.", source: "Человек-паук", cat: "cinema" },
  { text: "Говори тихо, но неси большую дубинку.", source: "Крёстный отец", cat: "cinema" },
  { text: "Страх — враг логики.", source: "Фрэнк Синатра", cat: "music" },
  { text: "Музыка — это ярлыки на флаконах с запахами воспоминаний.", source: "Наум Коржавин", cat: "music" },
  { text: "Когда слова заканчиваются, начинается музыка.", source: "Генрих Гейне", cat: "music" },
  { text: "Музыка — это то, что остаётся, когда всё сказано.", source: "Клод Дебюсси", cat: "music" },
];

const AD_SLOGANS = [
  // Слоганы, которые работают по-русски
  { text: "Просто сделай это.", source: "Nike, Wieden+Kennedy, 1988" },
  { text: "Думай иначе.", source: "Apple, TBWA\\Chiat\\Day, 1997" },
  { text: "Думай маленько.", source: "Volkswagen Beetle, Doyle Dane Bernbach, 1959" },
  { text: "Мы номер два. Мы стараемся сильнее.", source: "Avis, Doyle Dane Bernbach, 1962" },
  { text: "Бриллиант — навсегда.", source: "De Beers, N.W. Ayer, 1947" },
  { text: "Потому что ты этого достойна.", source: "L'Oréal, McCann, 1971" },
  { text: "Невозможное возможно.", source: "Adidas" },
  { text: "Лучшее или ничего.", source: "Mercedes-Benz" },
  { text: "Red Bull окрыляет.", source: "Red Bull" },
  { text: "Вот что я люблю.", source: "McDonald's, Heye & Partner, 2003" },
  { text: "Открой счастье.", source: "Coca-Cola, 2009" },
  { text: "Удовольствие от вождения.", source: "BMW" },
  { text: "Превосходство через технологии.", source: "Audi, 1971" },
  { text: "Не уходи из дома без него.", source: "American Express" },
  { text: "Сделано с заботой.", source: "Hallmark" },
  { text: "Есть вещи, которые не купишь. Для всего остального есть Mastercard.", source: "Mastercard, McCann, 1997" },
  // Про рекламу и коммуникацию
  { text: "Люди не покупают товары. Они покупают лучшие версии себя.", source: "Стив Джобс" },
  { text: "Хороший копирайтер — это хороший мыслитель с хорошим пером.", source: "Дэвид Огилви" },
  { text: "Не считайте потребителей идиотами. Потребитель — это ваша жена.", source: "Дэвид Огилви" },
  { text: "Реклама — это легализованная ложь.", source: "Герберт Уэллс" },
  { text: "Половина денег, которые я трачу на рекламу, уходит впустую. Беда в том, что я не знаю, какая половина.", source: "Джон Ванамейкер" },
  { text: "Продай огонь, а не камин. Продай вкус, а не стейк.", source: "Лео Бёрнетт" },
  { text: "Если вы не продаёте — это не творчество, это искусство.", source: "Фил Данзенберг" },
  { text: "Реклама — это искусство убеждать людей тратить деньги, которых у них нет, на вещи, которые им не нужны.", source: "Уилл Роджерс" },
  { text: "Единственный способ делать великую работу — любить то, что делаешь.", source: "Стив Джобс" },
];

const SELF_PROMO = [
  { text: "Женя — хороший копирайтер.", source: "Wieden+Kennedy", promo: true },
  { text: "Заплатите Жене много денег.", source: "Droga5", promo: true },
  { text: "Если ищете копирайтера — вы уже нашли.", source: "Cannes Lions", promo: true },
  { text: "Женя пишет так, что хочется купить.", source: "Клиент, который сначала сомневался", promo: true },
  { text: "Лучший бриф — это Женя без брифа.", source: "Арт-директор, пожелавший остаться анонимным", promo: true },
  { text: "Нанять Женю — лучшее решение квартала.", source: "Совет директоров", promo: true },
  { text: "Он просто понимает.", source: "Бренд, который наконец-то зазвучал", promo: true },
  { text: "Мы думали, что знаем, чего хотим. Женя знал лучше.", source: "Маркетинг-директор", promo: true },
];

let quoteCount = 0;
let selfPromoIndex = 0;
let currentQuote = null;
let typedChars = [];
let startTime = null;
let timerInterval = null;
let currentCat = 'all';
let totalDone = 0;
let isComplete = false;

function getPool() {
  if (currentCat === 'ad') return AD_SLOGANS;
  if (currentCat === 'all') return [...REGULAR, ...AD_SLOGANS];
  return REGULAR.filter(q => q.cat === currentCat);
}

function nextQuote() {
  quoteCount++;
  if (quoteCount % 4 === 0) {
    const q = SELF_PROMO[selfPromoIndex % SELF_PROMO.length];
    selfPromoIndex++;
    return { ...q };
  }
  const pool = getPool();
  let q;
  do { q = pool[Math.floor(Math.random() * pool.length)]; }
  while (pool.length > 1 && q === currentQuote);
  return { ...q, promo: false };
}

function loadQuote() {
  isComplete = false;
  document.getElementById('complete-overlay').classList.remove('show');
  currentQuote = nextQuote();
  typedChars = [];
  startTime = null;
  clearInterval(timerInterval);
  document.getElementById('wpm-val').textContent = '0';
  document.getElementById('acc-val').textContent = '100';
  document.getElementById('progress').style.width = '0%';
  document.getElementById('source-text').textContent = '— ' + currentQuote.source;
  document.getElementById('type-input').value = '';
  document.getElementById('type-input').focus();
  const meta = document.getElementById('quote-meta');
  if (currentQuote.promo) meta.classList.add('is-promo');
  else meta.classList.remove('is-promo');
  renderChars();
}

function renderChars() {
  const text = currentQuote.text;
  let html = '';
  for (let i = 0; i < text.length; i++) {
    let cls = 'char pending';
    if (i < typedChars.length) cls = typedChars[i] === text[i] ? 'char correct' : 'char wrong';
    else if (i === typedChars.length) cls = 'char pending cursor';
    html += `<span class="${cls}">${text[i] === ' ' ? '&nbsp;' : text[i]}</span>`;
  }
  document.getElementById('quote-display').innerHTML = html;
  document.getElementById('progress').style.width = Math.min(100, (typedChars.length / text.length) * 100) + '%';
}

function calcWPM() {
  if (!startTime) return 0;
  return Math.round((typedChars.length / 5) / ((Date.now() - startTime) / 60000)) || 0;
}
function calcAcc() {
  if (!typedChars.length) return 100;
  const wrong = typedChars.filter((c, i) => c !== currentQuote.text[i]).length;
  return Math.round(((typedChars.length - wrong) / typedChars.length) * 100);
}

document.getElementById('type-input').addEventListener('input', function() {
  if (isComplete) return;
  if (!startTime && this.value.length > 0) {
    startTime = Date.now();
    timerInterval = setInterval(() => {
      document.getElementById('wpm-val').textContent = calcWPM();
      document.getElementById('acc-val').textContent = calcAcc();
    }, 300);
  }
  typedChars = this.value.split('');
  renderChars();
  if (typedChars.length >= currentQuote.text.length) {
    clearInterval(timerInterval);
    isComplete = true;
    totalDone++;
    document.getElementById('counter').textContent = plural(totalDone, 'цитата', 'цитаты', 'цитат');
    const wpm = calcWPM();
    const acc = calcAcc();
    document.getElementById('wpm-val').textContent = wpm;
    document.getElementById('acc-val').textContent = acc;
    document.getElementById('c-wpm').textContent = wpm;
    document.getElementById('c-acc').textContent = acc + '% точность';
    document.getElementById('complete-overlay').classList.add('show');
  }
});

document.getElementById('type-input').addEventListener('keydown', function(e) {
  if (e.key === 'Backspace' && !isComplete) {
    typedChars = typedChars.slice(0, -1);
    renderChars();
  }
  if (e.key === 'Enter') { e.preventDefault(); loadQuote(); }
  if (e.key === 'Tab') { e.preventDefault(); loadQuote(); }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && isComplete) loadQuote();
});

document.getElementById('cats').addEventListener('click', function(e) {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  loadQuote();
});

function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return n + ' ' + one;
  if ([2,3,4].includes(m10) && ![12,13,14].includes(m100)) return n + ' ' + few;
  return n + ' ' + many;
}

loadQuote();
document.getElementById('type-input').focus();
</script>
</body>
</html>
